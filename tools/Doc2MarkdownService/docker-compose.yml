services:
  doc2md-service:
    image: docker.agnet.top/mark/doc2md-service:latest
    container_name: doc2md-service
    restart: unless-stopped
    ports:
      - "18000:8000"
    environment:
      DOC2MD_MAX_WORKERS: "4"
      DOC2MD_MAX_QUEUE_SIZE: "8"
      DOC2MD_MAX_UPLOAD_MB: "100"
      DOC2MD_MAX_RESPONSE_MB: "30"
      DOC2MD_REQUEST_TIMEOUT_SECONDS: "300"
      DOC2MD_OFFICE_TIMEOUT_SECONDS: "180"
      DOC2MD_CHUNK_SIZE_BYTES: "1048576"
